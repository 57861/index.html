<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPHAWARIN Portfolio | Law KKU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .step-card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="sticky top-0 z-50 nav-glass border-b border-slate-100 p-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-sky-900 p-2 rounded-xl text-white shadow-lg">
                <i data-lucide="scale" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-sky-950 leading-none">PAPHAWARIN</h1>
                <p class="text-[10px] font-bold text-sky-500 uppercase tracking-widest mt-1">Law Candidate 2026</p>
            </div>
        </div>
        <div class="bg-amber-50 text-amber-600 px-3 py-1 rounded-full text-[10px] font-bold border border-amber-100">
            LOCKED
        </div>
    </header>

    <div class="max-w-md mx-auto p-5">
        <!-- Main Card -->
        <div class="bg-white rounded-[2rem] p-8 text-center shadow-xl border border-white mb-8">
            <div class="w-24 h-24 bg-slate-100 rounded-3xl mx-auto mb-4 flex items-center justify-center border-4 border-white shadow-md">
                <i data-lucide="user" class="w-10 h-10 text-slate-300"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800">นางสาวปภาวรินทร์</h2>
            <p class="text-xs font-bold text-sky-600 uppercase mb-6">โรงเรียนนารีนุกูล</p>
            
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">รหัสผ่านสำหรับคุณครู</p>
                <div class="text-lg font-bold text-slate-700">1234</div>
            </div>
        </div>

        <!-- 10 Steps -->
        <div class="space-y-4">
            <h3 class="text-center font-bold text-slate-400 text-[10px] tracking-[0.3em] uppercase py-2">โครงสร้างพอร์ตโฟลิโอ 10 หน้า</h3>
            
            <div id="folio-content">
                <!-- ข้อมูลจะถูกโหลดที่นี่ -->
            </div>
        </div>
    </div>

    <!-- Bottom Nav (เหมือนในตัวอย่างที่เพื่อนส่งมา) -->
    <div class="fixed bottom-6 left-6 right-6 nav-glass border border-white p-3 rounded-full shadow-2xl flex justify-around items-center">
        <button class="p-3 text-sky-900"><i data-lucide="home"></i></button>
        <button class="p-3 text-slate-400"><i data-lucide="book-open"></i></button>
        <div class="w-12 h-12 bg-sky-900 text-white rounded-full flex items-center justify-center shadow-lg -mt-10 border-4 border-slate-50">
            <i data-lucide="plus"></i>
        </div>
        <button class="p-3 text-slate-400"><i data-lucide="eye"></i></button>
        <button class="p-3 text-slate-400" onclick="alert('คัดลอกลิงก์ด้านบนส่งคุณครูได้เลยค่ะ')"><i data-lucide="share-2"></i></button>
    </div>

    <script>
        const data = [
            { k: 'P', t: 'Profile', d: 'ประวัติส่วนตัวและแรงบันดาลใจ' },
            { k: 'A', t: 'Academic', d: 'ประวัติการศึกษาและผลการเรียน' },
            { k: 'P', t: 'Public Mind', d: 'จิตสาธารณะและงานอาสาสมัคร' },
            { k: 'H', t: 'Honors', d: 'รางวัลและเกียรติประวัติ' },
            { k: 'A', t: 'Activities', d: 'กิจกรรมในโรงเรียนนารีนุกูล' },
            { k: 'W', t: 'Workshop', d: 'การอบรมสัมมนาวิชาการ' },
            { k: 'A', t: 'Analytical', d: 'โครงงานและการคิดวิเคราะห์' },
            { k: 'R', t: 'Remarkable', d: 'ทักษะพิเศษ: พิธีกรภาษาจีน', h: true },
            { k: 'I', t: 'Internship', d: 'การดูงานในศาลหรือสถานประกอบการ' },
            { k: 'N', t: 'Next Step', d: 'เป้าหมายศึกษาต่อ นิติศาสตร์ มข.' }
        ];

        const container = document.getElementById('folio-content');
        data.forEach(item => {
            container.innerHTML += `
                <div class="step-card ${item.h ? 'border-sky-500 ring-2 ring-sky-50' : ''}">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 ${item.h ? 'bg-sky-600' : 'bg-slate-800'} text-white rounded-xl flex items-center justify-center font-bold">${item.k}</div>
                        <div>
                            <h4 class="font-bold text-sm text-slate-800">${item.t}</h4>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">${item.d}</p>
                        </div>
                    </div>
                    ${item.h ? `
                        <div class="mt-4 p-3 bg-sky-50 rounded-xl border border-sky-100">
                            <p class="text-[10px] font-bold text-sky-900">✨ กิจกรรมเด่น: 17 ก.พ. 2569</p>
                            <p class="text-[11px] text-sky-700 mt-1 italic">ทำหน้าที่พิธีกรภาษาจีน ณ เซ็นทรัลอุบลฯ เพื่อโชว์ทักษะ Public Speaking</p>
                        </div>
                    ` : ''}
                </div>
            `;
        });
        lucide.createIcons();
    </script>
</body>
</html>
